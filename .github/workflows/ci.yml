name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    env:
      # Dummy URLs — no real DB is accessed during build or tests.
      # All pages are force-dynamic; TypeScript checking needs a valid URL shape.
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/randomphitruongstore"
      DIRECT_URL: "postgresql://postgres:postgres@localhost:5432/randomphitruongstore"
      # Dummy values for NEXT_PUBLIC_ vars baked into the client bundle at build time
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
      # Dummy server-side secrets (never used during build/test)
      ADMIN_SESSION_SECRET: "ci-placeholder-secret-minimum-32-chars!!"
      ADMIN_PASSWORD: "ci-placeholder"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Secret scan
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.30.1 detect --no-git --source=/repo --redact --exit-code=1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Using standard LTS
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Run Linter
        run: npm run lint

      - name: Run Tests
        run: npm test

      - name: Build Next.js app
        run: npm run build
