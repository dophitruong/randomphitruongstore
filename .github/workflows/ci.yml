name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest

    env:
      # A dummy database URL is usually needed so Prisma schema can be evaluated
      # and Next.js can build without failing on missing env vars
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/randomphitruongstore?schema=public"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Using standard LTS
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run Linter
        run: npm run lint

      - name: Build Next.js app
        run: npm run build
